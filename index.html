<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>Code Extractor Pro</title>
    <meta name="title" content="Code Extractor Pro">
    <meta name="description" content="Instantly extract, view, format, and download HTML, CSS, JavaScript, and Image assets from any URL.">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://code-extractor-pro.netlify.app/">
    <meta property="og:title" content="Code Extractor Pro">
    <meta property="og:description" content="Instantly extract, view, format, and download HTML, CSS, and JS assets from any URL.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://code-extractor-pro.netlify.app/">
    <meta property="twitter:title" content="Code Extractor Pro">
    <meta property="twitter:description" content="Instantly extract, view, format, and download HTML, CSS, and JS assets from any URL.">
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" rel="stylesheet" />
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="landingView" class="landing-container">
    <h1 class="landing-title">Code Extractor <span class="badge" style="font-size: 1rem; padding: 0.2rem 0.5rem;">PRO</span></h1>
    <p class="landing-subtitle">Enter any website URL to instantly extract its HTML, CSS, JavaScript, and Images.</p>
    
    <div class="input-group landing-input-group">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        <input type="text" id="landingUrlInput" placeholder="https://example.com" autocomplete="off">
        <button id="landingFetchBtn">Extract Site</button>
    </div>
</div>

<div id="appWorkspace" class="app-wrapper hidden">
    <div class="top-bar">
        <div class="header-info">
            <h1>Code Extractor <span class="badge">PRO</span></h1>
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="formatBtn" class="action-btn" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                Format Code
            </button>
            <button id="togglePreviewBtn" class="action-btn" style="background-color: var(--accent); color: #ffffff; border: none; padding: 0.4rem 1.2rem; border-radius: 4px; font-weight: 500; font-size: 0.85rem; display: flex; align-items: center; cursor: pointer; transition: background-color 0.2s;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                Preview Site
            </button>
        </div>
    </div>

    <div class="workspace">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>EXPLORER</span>
                <button id="downloadZipBtn" class="action-btn" title="Download all files as ZIP" style="padding: 0.1rem 0.3rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>
            <div id="fileTree" class="file-tree">
                <div class="empty-state">No files extracted yet.</div>
            </div>
        </aside>

        <main class="editor-container">
            <div id="searchContainer" class="search-bar hidden">
                <input type="text" id="searchInput" placeholder="Find in code...">
                <div class="search-actions">
                    <span id="searchMatchCount" style="font-size: 0.75rem; color: var(--text-muted); margin-right: 8px;"></span>
                    <button id="closeSearchBtn" class="icon-btn">✖</button>
                </div>
            </div>

            <div id="viewCode" class="code-wrapper hidden">
                <pre class="line-numbers"><code id="outputArea" class="language-javascript"></code></pre>
            </div>
            
            <div id="viewPreview" class="preview-wrapper hidden">
                <iframe id="previewFrame"></iframe>
            </div>

            <div id="viewImage" class="image-wrapper hidden">
                <img id="imagePreview" src="" alt="Image Preview">
            </div>
        </main>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify-html.min.js"></script>

<script src="script.js"></script>
<script src="formatter.js"></script>
<script src="export.js"></script>
<script src="preview.js"></script>
<script src="search.js"></script>
</body>
</html>
